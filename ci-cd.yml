name: CI-CD Pipeline

on:
  push:
  pull_request:

jobs:
  run-anomaly-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Start pipeline run
        run: echo "[CI] Starting anomaly detection pipeline execution"

      - name: Ensure outputs directory
        run: mkdir -p outputs

      - name: Install Jupyter
        run: pip install notebook nbconvert ipykernel

      - name: Run Jupyter Notebook
        run: |
          jupyter nbconvert --to notebook --execute Nandana.ipynb --output executed_notebook.ipynb

      - name: Complete pipeline run
        run: echo "[CI] Completed anomaly detection pipeline execution"

      - name: Upload output artifacts
        uses: actions/upload-artifact@v4
        with:
          name: anomaly-pipeline-outputs
          path: |
            outputs/*.png
            outputs/*.csv
            outputs/*.docx
          if-no-files-found: warn
